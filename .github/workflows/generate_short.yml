name: Generate Short Video

on:
  schedule:
    - cron: '30 4 * * *'    # 10:00 AM IST → Short 1 (04:30 UTC)
    - cron: '30 11 * * *'   # 05:00 PM IST → Short 2 (11:30 UTC)
  workflow_dispatch:          # allow manual test trigger

permissions:
  contents: write             # needed to commit published_topics.json

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'            # CRITICAL: saves 3-5 min on every run

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-musicgen-small-v1
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Cache faster-whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-whisper-tiny-v1
          restore-keys: |
            ${{ runner.os }}-whisper-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Short
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
        run: python run_generate.py --format short

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ github.run_id }}
          path: |
            output/final_short.mp4
            output/thumbnail.jpg
            output/metadata.json
          retention-days: 7

      - name: Commit topic log (GH keepalive)
        run: |
          git config user.name "yt-bot"
          git config user.email "yt-bot@noreply"
          git add published_topics.json
          git diff --staged --quiet || git commit -m "chore: update published topics [skip ci]"
          git push || true
