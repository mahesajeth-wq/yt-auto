name: Generate Long Video

on:
  schedule:
    - cron: '0 6 * * 1'     # 11:30 AM IST every Monday (06:00 UTC)
  workflow_dispatch:          # allow manual test trigger

permissions:
  contents: write             # needed to commit published_topics.json + voice_state.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg


      - name: Cache faster-whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-whisper-base-v1
          restore-keys: |
            ${{ runner.os }}-whisper-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Long
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          COVERR_API_KEY:    ${{ secrets.COVERR_API_KEY }}
          NASA_API_KEY:      ${{ secrets.NASA_API_KEY }}
          GEMINI_API_KEYS:   ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_JUDGE_API_KEY: ${{ secrets.GEMINI_JUDGE_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
        run: python run_generate.py --format long

      - name: Publish to YouTube
        env:
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS:   ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_JUDGE_API_KEY: ${{ secrets.GEMINI_JUDGE_API_KEY }}
        run: python run_publish.py

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-video-${{ github.run_id }}
          path: |
            output/final_long.mp4
            output/thumbnail.jpg
            output/metadata.json
          retention-days: 7

      - name: Commit topic log + voice state
        run: |
          git config user.name "yt-bot"
          git config user.email "yt-bot@noreply"
          git add published_topics.json voice_state.json
          git diff --staged --quiet || git commit -m "chore: update published topics + voice state [skip ci]"
          git push || true
