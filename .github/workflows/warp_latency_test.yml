name: WARP Latency Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests[socks] pysocks

      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | gpg --yes --dearmor \
            -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | tee /etc/apt/sources.list.d/cloudflare-client.list
          apt-get update && apt-get install -y cloudflare-warp
          warp-cli mode proxy
          warp-cli proxy port 40000
          warp-cli registration new
          warp-cli connect
          sleep 5
          warp-cli status

      - name: Verify WARP exit IP
        run: |
          IP_INFO=$(curl -s https://ipinfo.io/json)
          echo "$IP_INFO"
          echo "$IP_INFO" | grep -q "Cloudflare" \
            && echo "WARP active — Cloudflare IP confirmed" \
            || (echo "WARP NOT active — aborting" && exit 1)

      - name: Run latency probe
        run: python3 warp_latency_test.py
